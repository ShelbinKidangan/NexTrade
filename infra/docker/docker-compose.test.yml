# Lightweight infra for integration tests — DB only
# MassTransit uses in-memory test harness, Valkey is not required for tests
#
# Usage:
#   docker compose -f infra/docker/docker-compose.test.yml up -d

services:
  db-test:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nextrade_test
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nextrade_test"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes: {}
